name: Scheduled test run

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /run on deployed app
        shell: bash
        run: |
          set -euo pipefail
          DOMAIN="${{ secrets.PA_WEBAPP_DOMAIN }}"
          if [[ -z "${DOMAIN}" ]]; then
            echo "PA_WEBAPP_DOMAIN secret is not set" >&2
            exit 1
          fi
          echo "Triggering https://${DOMAIN}/run"
          http_code=$(curl -sS -o /tmp/run_body -w "%{http_code}" -X POST \
            -H "Accept: application/json" \
            "https://${DOMAIN}/run")
          echo "HTTP ${http_code}"
          cat /tmp/run_body || true
          echo
          if [[ "${http_code}" == "429" ]]; then
            echo "Rate limited (anti-spam 30s) — considered OK."
            exit 0
          fi
          if [[ "${http_code:0:1}" != "2" ]]; then
            exit 1
          fi
